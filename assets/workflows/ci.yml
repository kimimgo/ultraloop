# Bot QA — CI (SPEC v0.3 / REQ-CI-1)
# Fast checks (lint·typecheck·unit) always run; heavy checks (test·build·smoke) run only on PRs.
# Default stack is Python. See the commented-out parts when switching to Node.
name: ci

on:
  pull_request:
    branches: [main]
    # To skip CI on docs-only PRs, use paths-ignore:
    # paths-ignore:
    #   - '**.md'
    #   - 'docs/**'
  push:
    # main is handled by CD, so it is excluded.
    branches-ignore: [main]

# Cancel older runs on the same branch — keep only the latest one (prevents pile-up).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Fast tier: always runs on every push/PR ---
  lint:
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install deps
        run: pip install -e '.[dev]'   # or: uv pip install -e '.[dev]'
      - name: lint
        run: ruff check .
      # --- Node example ---
      # - uses: actions/setup-node@v4
      #   with: { node-version: '20' }
      # - run: corepack enable && pnpm install --frozen-lockfile
      # - run: pnpm lint

  typecheck:
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - name: typecheck
        run: mypy .
      # --- Node example ---
      # - run: pnpm typecheck   # tsc --noEmit

  unit:
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - name: unit tests (fast ones only)
        run: pytest tests/unit -q
      # --- Node example ---
      # - run: pnpm test:unit

  # --- Heavy tier: runs only on PRs ---
  test:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - name: full tests + coverage
        # The coverage threshold follows the repo setting (default 80%).
        # Do not break the build with a hardcoded number — the agent adjusts the line below.
        run: pytest --cov --cov-report=term-missing --cov-fail-under=80
      # --- Node example ---
      # - run: pnpm test:cov

  build:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - name: build package
        run: python -m build
      # --- Node example ---
      # - run: pnpm build

  smoke:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.'
      - name: smoke test (only checks that the app boots)
        run: python -c "import app; print('ok')"   # replace with the real entrypoint
      # --- Node example ---
      # - run: node -e "require('./dist'); console.log('ok')"
