# nightly E2E — full regression (SPEC v0.3 / REQ-CD-2, REQ-E2E-8)
# The per-loop E2E is local and lightweight; the full suite runs here every night.
name: nightly-e2e

on:
  schedule:
    # Daily at 17:17 UTC. (avoids :00 sharp — eases runner congestion)
    - cron: '17 17 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      # --- Node example ---
      # - uses: actions/setup-node@v4
      #   with: { node-version: '20' }
      # - run: corepack enable && pnpm install --frozen-lockfile

      - name: start the stack (docker compose)
        run: docker compose up -d --wait   # placeholder

      - name: run the full E2E scenarios
        run: pytest tests/e2e -v   # placeholder — full regression suite
        # --- Node example ---
        # run: pnpm test:e2e

      - name: tear down the stack
        if: always()
        run: docker compose down -v

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: e2e/reports/
          if-no-files-found: ignore
