# CD — automatic staging deploy + production HITL gate (SPEC v0.3 / REQ-CD-1, REQ-CD-2)
# Secrets come only from GitHub Actions Secrets / Environment Secrets — no plaintext.
name: cd

on:
  push:
    branches: [main]
    tags: ['v*']
  # Rollback path: run manually to revert to a specific version.
  workflow_dispatch:
    inputs:
      rollback_to:
        description: 'Version to roll back to (e.g. v1.2.3). Leave empty for a normal deploy.'
        required: false
        default: ''

# Least privilege. Grant contents: write only in the production job that needs releases.
permissions:
  contents: read

jobs:
  build:
    # Rollback runs do not build anew (they redeploy an existing version).
    if: ${{ github.event.inputs.rollback_to == '' }}
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - name: build image/artifact
        # placeholder — replace with the real build.
        run: |
          echo "docker build -t myapp:${GITHUB_SHA} ."
          # or a package build: python -m build

  deploy-staging:
    if: ${{ github.event.inputs.rollback_to == '' }}
    needs: build
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    steps:
      - uses: actions/checkout@v4
      - name: deploy to staging
        run: echo "deploy to staging..."   # placeholder
      - name: smoke test
        # This skill finishes E2E before merge, so the staging smoke is only a thin re-check.
        id: smoke
        run: echo "smoke ok"   # placeholder
      - name: record deploy summary
        run: |
          {
            echo "## staging deploy"
            echo "- version: ${GITHUB_REF_NAME} (${GITHUB_SHA::7})"
            echo "- staging URL: https://staging.example.com"
            echo "- smoke: ok"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    if: ${{ github.event.inputs.rollback_to == '' }}
    needs: deploy-staging
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    # The production Environment has required reviewers attached (bootstrap registers
    # them from config hitl.reviewers), so GitHub holds the job until a human approves (HITL).
    # Never bypass this gate.
    environment: production
    permissions:
      contents: write   # for creating the release
    steps:
      - uses: actions/checkout@v4
      - name: deploy to production
        run: echo "deploy to production..."   # placeholder (runs after approval)
      - name: health check
        run: echo "health ok"   # placeholder
      - name: create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback:
    # Manual rollback — only when workflow_dispatch was given a version.
    if: ${{ github.event.inputs.rollback_to != '' }}
    runs-on: self-hosted   # ★ enforced: self-hosted principle — GitHub-hosted forbidden (ci-cd-hitl.md §0)
    # Rollback also passes through human approval (the same production gate).
    environment: production
    steps:
      - name: redeploy the specified version
        run: |
          echo "rollback to ${{ github.event.inputs.rollback_to }}"   # placeholder
          # e.g. docker pull myapp:${{ github.event.inputs.rollback_to }} && deploy
      - name: health check
        run: echo "health ok after rollback"   # placeholder
