# ultraloop lane-isolation example compose (webapp + db, minimum 2 services).
#
# lane = a unit of parallel work. Isolate these 3 things so lanes do not collide:
#   1) project-name: bring it up as `ue-<issue#>` → separate container/network namespaces
#        e.g. docker compose -p ue-42 up -d
#   2) ports: dynamic allocation (`${UE_PORT:-14000}` style) → a different host port per lane
#   3) volumes: per-lane names (suffixed with `${UE_LANE:-default}`) → prevents data mixing
#
# The E2E `up` calls the single README command (e.g. `docker compose -p ue-<issue#> up -d`) verbatim.

services:
  web:
    build: .
    ports:
      - "${UE_PORT:-14000}:8000"
    environment:
      - DATABASE_URL=postgres://app:app@db:5432/app
      # Inject secrets via .env (never commit). See .env.example for a sample.
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  # Per-lane isolation: mix the lane identifier into the name so data does not mix.
  db-data:
    name: "ue-${UE_LANE:-default}-db-data"
