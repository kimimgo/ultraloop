# ultraloop 레인 격리 예시 compose (웹앱 + db 최소 2서비스).
#
# 레인 = 병렬 작업 단위. 레인끼리 충돌하지 않게 아래 3가지를 격리한다:
#   1) project-name: `ue-<issue#>` 로 띄운다 → 컨테이너/네트워크 네임스페이스 분리
#        예) docker compose -p ue-42 up -d
#   2) 포트: 동적 할당 (`${UE_PORT:-14000}` 식) → 레인마다 다른 호스트 포트
#   3) 볼륨: 레인별 이름 (`${UE_LANE:-default}` 접미) → 데이터 섞임 방지
#
# E2E `up`은 README의 단일 명령(예: `docker compose -p ue-<issue#> up -d`)을 그대로 부른다.

services:
  web:
    build: .
    ports:
      - "${UE_PORT:-14000}:8000"
    environment:
      - DATABASE_URL=postgres://app:app@db:5432/app
      # 시크릿은 .env로 주입(커밋 금지). 예시는 .env.example 참조.
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  # 레인별 격리: 이름에 레인 식별자를 섞어 데이터가 섞이지 않게 한다.
  db-data:
    name: "ue-${UE_LANE:-default}-db-data"
