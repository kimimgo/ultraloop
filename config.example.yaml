# ──────────────────────────────────────────────────────────────────────────
#  ultraloop.config.yaml  —  copy to the target repo root and adjust only the values to your environment.
#    cp ${CLAUDE_PLUGIN_ROOT}/config.example.yaml ./ultraloop.config.yaml
#
#  Philosophy: this skill is "non-deterministic". The values below are *default guides*; leave them
#  empty (""/auto) and the agent decides for itself from the project environment in step ① (plan check) of every loop.
#  Only fields marked [required] must be filled. Leave the rest empty if unsure — the skill probes.
# ──────────────────────────────────────────────────────────────────────────

# ── Target & mission ───────────────────────────────────────────────────────
# [required] Target repo (owner/name or https URL). A slash-command argument takes precedence.
repo: ""                          # e.g. owner/my-app

# [required, one of the two] Goal, scope, and DoD reinforcement for this run.
mission_file: ""                  # external markdown path (recommended). Suited to long, detailed specs.
mission: |                        # or one inline paragraph.
  (You may write the mission here — what, why, and what counts as "100% working")

default_branch: main
coverage_target: 80               # DoD gate — test coverage target (%)

# ── Roadmap SoT = GitHub Projects (v2) board ───────────────────────────────
#  The board is the single source of truth for mutable state. PROGRESS.md is a read-only view regenerated from it.
roadmap:
  provider: github_projects_v2    # github_projects_v2 | milestones (fallback, R2)
  project_node_id: ""             # bootstrap records this automatically after query-then-create (idempotent). Do not touch.
  project_number: ""              # 〃 (the human-visible number)
  # The `project` SCOPE is what's needed — not an env var per se (the default GITHUB_TOKEN cannot
  #   automate the board, REQ-CI-3). Two equally valid ways, checked as CAPABILITY by config_check:
  #   ① interactive hosts: `gh auth refresh -h github.com -s project` — gh's own keyring token gains the
  #      scope; NO env var needed (runtime falls back to gh's auth when the env is unset/empty).
  #   ② CI/unattended: inject a project-scope PAT via env GH_TOKEN or UE_PROJECT_TOKEN.
  token_env: UE_PROJECT_TOKEN     # env name to read the board token from (falls back to gh keyring auth if unset).
  ready_status: "Ready"           # Status option name meaning "ready to start". ⚠️ The default GitHub board (Todo/In Progress/Done)
                                  #   has no Ready option → change this to "Todo" or the loop will not pick up work.
  approved: false                 # v0.13: NOT an entry gate anymore. The loop opens on board population (Ready cards),
                                  #   and the human checks direction once after the first slice ships — no pre-approval label required.
                                  #   (kept for backward compat / your own tracking; ignored by the entry gate.)
  # ★ Golden template — views, the Roadmap layout, and built-in workflows cannot be created via the API (verified) → only copyProjectV2 cloning works.
  #   Board structure/setup authority = the gh-roadmap skill. Bootstrap clones this id via gh-roadmap roadmap_bootstrap.sh.
  template_node_id: ""            # node id of your own golden template board (e.g. "PVT_kwHOxxxxxxxxxxxxx" — has the 3 role views
                                  #   Roadmap—PM·Schedule / Dev Board / Build Monitor + ROADMAP_LAYOUT + Horizon/Target Date).
                                  #   Empty = fresh board (no roadmap views or built-in workflows — one-time setup per golden-template-setup.md recommended).

# ── Shared board (one board spanning N repos — board side, gh-roadmap territory) ──
#  ultraloop itself is single-repo: it executes THIS repo's assigned slice (its epic/milestone) and nothing else.
#  When the board spans multiple repos (gh-roadmap multi-repo link), set shared:true so the goal gate and
#  Ready picks count only this repo's cards — never the whole shared board. One repo = one ultraloop session.
board:
  shared: false

# ── Spec authority = GitHub Spec Kit (planning-gate artifact) ────────────────
#  At the gate run `specify init . --integration claude --script sh` (v0.10.x). ⚠️ The Claude integration installs as
#  .claude/skills/speckit-* skills, not slash commands — draft via the speckit-constitution/-specify/-clarify/-plan/-tasks/-analyze
#  chain, then turn into issues with speckit-taskstoissues to link the board. specs/ is the spec source (.specify/ is created by init).
spec:
  tool: github_speckit            # spec-writing tool. Empty = agent decides at the gate.
  specs_dir: specs/               # spec source directory (bootstrap only makes the placeholder; specify init runs at the gate).
  freeze_in_loop: true            # freeze specs/ during the loop. false = allow in-flight edits (not recommended).

# ── Autonomy engine: /loop (self-pacing) + /goal (stop-blocking gate) ★ the inherited built-in engines ─
engine:
  # /loop — self-pacing. Empty interval = ScheduleWakeup dynamic pacing (recommended for long runs).
  #   A value means CronCreate fixed interval (e.g. "30m"). For event waits (e.g. CI/E2E) arm Monitor.
  loop:
    pacing: dynamic               # dynamic (ScheduleWakeup) | interval (CronCreate)
    interval: ""                  # only when pacing=interval. e.g. "20m"  (empty = dynamic)
    idle_wakeup_seconds: 1200     # dynamic fallback heartbeat (wakeup interval when no external events)
  # /goal — Stop-hook gate. On every stop attempt, goal_check re-verifies DoD satisfaction.
  #   Unmet → block the stop + accumulate iteration/last_reason + continue. Met → clear (allow the stop).
  goal:
    enabled: true
    install_stop_hook: true       # OBSOLETE since v0.13.4 — the gate ships with the plugin's own hook registration
                                  #   (hooks/hooks.json, version-independent); bootstrap only cleans up legacy per-repo entries.
                                  #   Kept for backward compat; no code reads it. Runtime disable = engine.goal.enabled.
    condition: "DoD"              # "DoD" = every item of definition-of-done.md. Or a free-form condition string.
    scope: "board"                # run scope: "board" = full-board completion (default) |
                                  #   "milestone:<title>" = this run ends when THAT milestone is drained
                                  #   (goal gate counts only its issues; Ready pick + deploy marker scope with it —
                                  #   the machine counterpart of per-milestone goals in north-star.md §2)
                                  # ⚠️ v0.14 (#2): this branch-committed value is a LEGACY FALLBACK + cache. The pointer's
                                  #   SoT is the board — the `Active-Milestone:` line pm keeps in the north-star issue
                                  #   (north-star.md §2.5). Board pointer wins; a divergence halts the drain gates loudly.
    lease_ttl_minutes: 45         # v0.14 (#3): single-drainer lease TTL. One loop per repo/board holds the drain seat
                                  #   (hidden git ref refs/ultraloop/drain-lease — atomic create/fast-forward); it renews
                                  #   every loop ① and a dead drainer's seat is reclaimable after this many minutes.
                                  #   Must exceed the loop tick gap (idle_wakeup_seconds) with margin.
    # ↓ hard guards (infinite-loop prevention — mandatory. Blocks a repeat of the past guard-less Stop-hook incident)
    max_iterations: 200           # cap on how many times the Stop hook may cumulatively block a stop
    max_stall_iterations: 10      # no-progress guard: if the goal_check reason is identical N times in a row (= zero progress),
                                  #   allow the stop + escalate. Blocks busywork/429 storms at the DoD ceiling (all remaining
                                  #   cards parked/blocked) (references/failure-modes.md FM1). 0 = disabled.
    lock_file: ""                 # concurrent re-entry lock (empty = the script uses a per-uid default path)
  # ── loop autonomy — where the pm↔loop permission boundary is drawn ──────────────────
  #   card      = loop executes pre-written cards only; every new card is pm's.
  #   milestone = loop may BREED its own tactical TDD cards INSIDE the active milestone envelope (recommended).
  #               Envelope gate (north-star.md §4.5) — a bred card is admissible only if ALL hold:
  #               (a) it carries a Goal-link: to the ACTIVE milestone's goal,
  #               (b) it does not advance any north-star anti-goal,
  #               (c) it creates NO new milestone / Initiative / Epic (structural scope stays pm's).
  #               Strategic scope (new milestone/Epic, anti-goal boundary, north-star change) still escalates to pm.
  #   epic      = the same envelope one tier up (active Epic). Stronger autonomy, weaker pm control → scope-drift risk.
  autonomy: milestone           # card | milestone (recommended, shipped default) | epic  ·  pairs with goal.scope above

# ── Cost/time/observability ceilings (exceeding = safe stop = budget-stop, exit 7) ───────────
budgets:
  max_loops: 0                    # 0 = unlimited (but goal.max_iterations still caps). >0 caps the loop count.
  max_wall_clock_hours: 24        # wall-clock ceiling for the whole run
  max_tokens: 0                   # token accounting belongs to the harness (session) — cost_guard does not tally it (best-effort). Display/future.
  ci_minutes_per_day: 0           # the CI-minutes circuit breaker is not implemented yet (best-effort) — display/future.
  dead_mans_switch_minutes: 30    # alert after N minutes without progress

# ── HITL (human confirmation) — production deployment gate ──────────────────
hitl:
  enabled: true
  reviewers: [""]                 # GitHub username/team — bootstrap registers them as production env required reviewers
  gated_environment: production

# ── Deploy target ─────────────────────────────────────────────────────────
deploy:
  mode: local_e2e_only            # local_e2e_only | staging_cloud
  staging: { enabled: false, url: "" }
  production: { enabled: false, url: "" }

# ── CI/CD runners — ★ self-hosted principle (enforced, ci-cd-hitl.md §0) ─────
#  Every Actions job runs on self-hosted runners. GitHub-hosted (ubuntu-latest etc.) is forbidden.
#  The bootstrap probe confirms a runner is online — if none, the loop must not proceed + alert.
ci:
  runs_on: [self-hosted]          # only adding labels is allowed (e.g. [self-hosted, linux, x64]). Replacing with hosted is forbidden.

# ── Stack hints (empty = auto-detect in every loop ① → apply the rulepack) ───
stack:
  language: ""                    # python | typescript | go | ... (empty = auto)
  package_manager: ""             # uv | pnpm | ...
  test_command: ""                # e.g. "pytest -q"
  lint_command: ""                # e.g. "ruff check ."
  build_command: ""               # e.g. "docker build ."

# ── Build methodology — the per-lane discipline is a REQUIRED BARRIER (v0.16) ─────
#  Every coding lane is driven by the superpowers skill chain (test-driven-development ·
#  systematic-debugging · requesting/receiving-code-review · verification-before-completion ·
#  finishing-a-development-branch). Missing plugin = the loop STOPS at the doctor/bootstrap barrier
#  (like the pm strategy-red-team barrier); there is no built-in Red→Green→Refactor fallback anymore.
methodology:
  superpowers: required           # required (default) | optional (legacy loud-fallback — NOT recommended)
  tdd_evidence: enforce           # enforce | warn | off — deterministic pre-merge commit-order gate:
                                  #   test:* must precede feat:/fix:* per lane branch (methodology_check.sh; ship_pr exit 7)

# ── Production E2E (Tier 2) — pre-merge gate ★ ──────────────────────────────
e2e:
  runner: auto                    # auto | docker_compose | readme_command
  ui_driver: browser_mcp          # browser_mcp (headless) | playwright_headless (fallback)
  base_port: 14000                # starting point for per-lane dynamic port allocation (collision avoidance)
  health_timeout_seconds: 120
  flake_retries: 3                # backoff retries for transient failures (strike only afterwards)
  screenshot_max_mb: 2            # DLP — screenshot compression/downscale ceiling
  secrets_file: ".env.e2e"        # credential injection source (no plaintext commits; discarded at teardown)

# ── Parallel lanes (worktree) ────────────────────────────────────────────────
#  NOTE (#5): long-lived WORKSTREAM worktrees (e.g. .worktrees/chat — one pm+loop pair each) are a
#  different thing from the transient TDD lanes below. A workstream worktree derives its lane name
#  from its DIRECTORY NAME, drains only cards labeled ws:<name>, and holds its own drain seat —
#  zero config here; pm assigns the labels (engine-loop-and-goal.md §6.1).
worktree:
  max_lanes: 4                    # concurrent lane count per wave (v0.13: default 2 -> 4; fan out only module-non-conflicting issues)
  root: "../.ue-worktrees"        # lane worktree root
  base_ref: "fresh"               # branch base for isolated lanes — fresh=origin/<default> (recommended: reproducible, no unpushed work leaks in) | head=local HEAD (build on unpushed commits)
                                  #   bootstrap_repo.sh records this value as worktree.baseRef in the target repo .claude/settings.json

# ── ★ Dynamic workflow (Claude Code Workflow tool) — references/dynamic-workflow-design.md ──
#  ⚠️ "Workflow" here = the Claude Code multi-agent orchestration tool. Entirely different from GitHub Projects
#  built-in workflows (board side = gh-roadmap). A skill cannot change the session model (the user sets --model);
#  casting applies to SUBAGENTS, where per-call model/effort IS enforceable. The shipped workflows/ scripts carry
#  these defaults in code; this block overrides them.
workflow:
  orchestrate: true               # run pm/loop core stages as dynamic workflows. false = solo agent throughout (small scale)
  casting:                        # ★ model×effort per stage TYPE (dynamic-workflow-design.md §2)
    coding:       { model: sonnet, effort: xhigh }  # agents that write/edit source (TDD lanes, fixes, tests)
    reasoning:    { model: "",     effort: xhigh }  # design/judgment stages — empty model = inherit the MAIN session (run it on fable/opus)
    verification: { model: "",     effort: high  }  # adversarial reviewers / evidence auditors — inherit main session
    mechanical:   { model: haiku,  effort: low   }  # inventories, parsing, formatting sweeps
  max_subagents: 8                # concurrency cap — actual = min(this, 16, cores-2)

# ── Notifications & approvals — outbound-only (fire-and-continue) ─────────────
#  Notifications POST an embed to a channel (notify.sh); approvals are a file queue answered by
#  `echo Y > <queue>/<id>.result` from any shell (notify-approval.md). No inbound bot, no gateway.
discord:
  enabled: true
  token_env: ULTRALOOP_DISCORD_BOT_TOKEN   # env name to read the token from (no plaintext). Missing token = console fallback.
  notify_channel_id: ""           # routine notifications (loop/push/CI/E2E/heartbeat/approval-pending)
  approval_ttl_minutes: 120       # approval queue: no-response TTL → escalate/defer (never auto-proceed)

# ── Risk (defaults; rules live in references/notify-approval.md) ─────────────
risk:
  # references is the authority for classifying high risk (approval queue + park) vs low risk (notify + proceed). Only toggles here.
  treat_dependency_major_as_high: true
