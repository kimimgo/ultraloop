# ──────────────────────────────────────────────────────────────────────────
#  ultraloop.config.yaml  —  copy to the target repo root and adjust only the values to your environment.
#    cp ${CLAUDE_PLUGIN_ROOT}/config.example.yaml ./ultraloop.config.yaml
#
#  Philosophy: this skill is "non-deterministic". The values below are *default guides*; leave them
#  empty (""/auto) and the agent decides for itself from the project environment in step ① (plan check) of every loop.
#  Only fields marked [required] must be filled. Leave the rest empty if unsure — the skill probes.
# ──────────────────────────────────────────────────────────────────────────

# ── Target & mission ───────────────────────────────────────────────────────
# [required] Target repo (owner/name or https URL). A slash-command argument takes precedence.
repo: ""                          # e.g. owner/my-app   (decision 1: first dry-run repo)

# [required, one of the two] Goal, scope, and DoD reinforcement for this run.
mission_file: ""                  # external markdown path (recommended). Suited to long, detailed specs.
mission: |                        # or one inline paragraph.
  (You may write the mission here — what, why, and what counts as "100% working")

default_branch: main
coverage_target: 80               # DoD gate — test coverage target (%)

# ── Roadmap SoT = GitHub Projects (v2) board ───────────────────────────────
#  The board is the single source of truth for mutable state. PROGRESS.md is a read-only view regenerated from it.
roadmap:
  provider: github_projects_v2    # github_projects_v2 | milestones (fallback, R2)
  project_node_id: ""             # bootstrap records this automatically after query-then-create (idempotent). Do not touch.
  project_number: ""              # 〃 (the human-visible number)
  # A project-scope PAT/App is needed — the default GITHUB_TOKEN cannot automate the board (REQ-CI-3).
  #   gh auth: PAT with the 'project' scope. Inject via env GH_TOKEN or UE_PROJECT_TOKEN.
  token_env: UE_PROJECT_TOKEN     # env name to read the board token from (falls back to gh default if unset).
  ready_status: "Ready"           # Status option name meaning "ready to start". ⚠️ The default GitHub board (Todo/In Progress/Done)
                                  #   has no Ready option → change this to "Todo" or workers will not pick up work (verified in a real multi-repo topology).
  approved: false                 # approval flag for the milestones fallback path (with provider=github_projects_v2 the
                                  #   roadmap:approved label decides, so this value is ignored).
  # ★ Golden template — views, the Roadmap layout, and built-in workflows cannot be created via the API (verified) → only copyProjectV2 cloning works.
  #   Board structure/setup authority = the gh-roadmap skill. Bootstrap clones this id via gh-roadmap roadmap_bootstrap.sh.
  template_node_id: ""            # node id of your own golden template board (e.g. "PVT_kwHOxxxxxxxxxxxxx" — has the 3 role views
                                  #   Roadmap—PM·Schedule / Dev Board / Build Monitor + ROADMAP_LAYOUT + Horizon/Target Date).
                                  #   Empty = fresh board (no roadmap views or built-in workflows — one-time setup per golden-template-setup.md recommended).

# ── Spec authority = GitHub Spec Kit (planning-gate artifact, SKILL §4.1.3) ──
#  At the gate run `specify init . --integration claude --script sh` (v0.10.x). ⚠️ The Claude integration installs as
#  .claude/skills/speckit-* skills, not slash commands — draft via the speckit-constitution/-specify/-clarify/-plan/-tasks/-analyze
#  chain, then turn into issues with speckit-taskstoissues to link the board. specs/ is the spec source (.specify/ is created by init).
spec:
  tool: github_speckit            # spec-writing tool. Empty = agent decides at the gate.
  specs_dir: specs/               # spec source directory (bootstrap only makes the placeholder; specify init runs at the gate).
  freeze_in_loop: true            # freeze specs/ during the loop (§4.1.4). false = allow in-flight edits (not recommended).

# ── Autonomy engine: /loop (self-pacing) + /goal (stop-blocking gate) ★ the inherited built-in engines ─
engine:
  # /loop — self-pacing. Empty interval = ScheduleWakeup dynamic pacing (recommended for long runs).
  #   A value means CronCreate fixed interval (e.g. "30m"). For event waits (e.g. CI/E2E) arm Monitor.
  loop:
    pacing: dynamic               # dynamic (ScheduleWakeup) | interval (CronCreate)
    interval: ""                  # only when pacing=interval. e.g. "20m"  (empty = dynamic)
    idle_wakeup_seconds: 1200     # dynamic fallback heartbeat (wakeup interval when no external events)
  # /goal — Stop-hook gate. On every stop attempt, goal_check re-verifies DoD satisfaction.
  #   Unmet → block the stop + accumulate iteration/last_reason + continue. Met → clear (allow the stop).
  goal:
    enabled: true
    install_stop_hook: true       # install the Stop hook into the target repo .claude/settings.json (= /goal as-is)
    condition: "DoD"              # "DoD" = every item of definition-of-done.md. Or a free-form condition string.
    scope: "board"                # v0.10 run scope: "board" = full-board completion (default) |
                                  #   "milestone:<title>" = this run ends when THAT milestone is drained
                                  #   (goal gate counts only its issues; Ready pick + deploy marker scope with it —
                                  #   the machine counterpart of per-milestone goals in north-star.md §2)
    # ↓ §15 hard guards (infinite-loop prevention — mandatory. Blocks a repeat of the past guard-less Stop-hook incident)
    max_iterations: 200           # cap on how many times the Stop hook may cumulatively block a stop
    max_stall_iterations: 10      # no-progress guard: if the goal_check reason is identical N times in a row (= zero progress),
                                  #   allow the stop + escalate. Blocks busywork/429 storms at the DoD ceiling (all remaining
                                  #   cards parked/blocked) (references/failure-modes.md FM1). 0 = disabled.
    lock_file: ""                 # concurrent re-entry lock (empty = the script uses a per-uid default path)

# ── §15 cost/time/observability ceilings (exceeding = safe stop = budget-stop, exit 7) ───────────
budgets:
  max_loops: 0                    # 0 = unlimited (but goal.max_iterations still caps). >0 caps the loop count.
  max_wall_clock_hours: 24        # wall-clock ceiling for the whole run
  max_tokens: 0                   # token accounting belongs to the harness (session) — cost_guard does not tally it (best-effort). Display/future.
  ci_minutes_per_day: 0           # the CI-minutes circuit breaker is not implemented yet (best-effort) — display/future (REQ-CD-3).
  dead_mans_switch_minutes: 30    # alert after N minutes without progress (REQ-ST-3)
  # ↓ N-repo mode only (measured: 3 concurrent xhigh workers = 77% of the weekly quota — multi-repo §6)
  weekly_usage_floor_percent: 90  # stop launching new workers at this % of weekly usage (finish in-flight work only). Meta decides.
  effort_by_task: {}              # effort tier per task type. e.g. {scaffold: medium, analysis: medium, design: high}

# ── HITL (human confirmation) — production deployment gate ──────────────────
hitl:
  enabled: true
  reviewers: [""]                 # GitHub username/team — bootstrap registers them as production env required reviewers
  gated_environment: production

# ── Deploy target (decision 2: local E2E only vs staging cloud) ─────────────
deploy:
  mode: local_e2e_only            # local_e2e_only | staging_cloud
  staging: { enabled: false, url: "" }
  production: { enabled: false, url: "" }

# ── CI/CD runners — ★ self-hosted principle (enforced, ci-cd-hitl.md §0) ─────
#  Every Actions job runs on self-hosted runners. GitHub-hosted (ubuntu-latest etc.) is forbidden.
#  The bootstrap probe confirms a runner is online — if none, the loop must not proceed + alert.
ci:
  runs_on: [self-hosted]          # only adding labels is allowed (e.g. [self-hosted, linux, x64]). Replacing with hosted is forbidden.

# ── Stack hints (empty = auto-detect in every loop ① → apply the rulepack) ───
stack:
  language: ""                    # python | typescript | go | ... (empty = auto)
  package_manager: ""             # uv | pnpm | ...
  test_command: ""                # e.g. "pytest -q"
  lint_command: ""                # e.g. "ruff check ."
  build_command: ""               # e.g. "docker build ."

# ── Optional: GAN quality loop (Generator-Evaluator iteration in lane ⑥ E2E — borrowed from gan-style-harness) ─
quality:
  gan_evaluator: false            # true = gan-evaluator (a locally installed agent) scores the E2E evidence against the issue
                                  #   acceptance-criteria rubric → below threshold, the lane reworks and re-evaluates.
  threshold: 8                    # passing bar out of 10
  max_rounds: 3                   # ★ mandatory hard guard — no infinite repetition in the quality loop either (3 misses = Parked + approval queue)

# ── Optional: reliability eval (pass@k / pass^k — borrowed from the eval-harness skill) ────────────
# A single pass does not guarantee the reliability of a flaky change. Critical cards measure stability via repeated runs.
eval:
  enabled: false                  # true adds a pass@k/pass^k reliability gate to card verification (off = the existing loop is unaffected)
  capability_pass_at_k: 3         # capability eval: measure 1+ passes out of k attempts (pass@k)
  capability_threshold: 0.9       # pass@k passing bar (default pass@3 ≥ 0.90)
  regression_pass_caret_k: 3      # regression eval: critical paths must pass all k runs (pass^k = 1.0)
  critical_labels: ["release-critical", "payment", "auth"]  # card labels that force pass^k
  max_k: 5                        # ★ hard guard — repetition ceiling (no infinite reruns)
  artifact_dir: ".claude/evals"   # where eval definitions/logs are stored (eval-harness layout)

# ── Production E2E (Tier 2) — pre-merge gate ★ ──────────────────────────────
e2e:
  runner: auto                    # auto | docker_compose | readme_command
  ui_driver: browser_mcp          # browser_mcp (headless) | playwright_headless (fallback)
  base_port: 14000                # starting point for per-lane dynamic port allocation (collision avoidance)
  health_timeout_seconds: 120
  flake_retries: 3                # backoff retries for transient failures (strike only afterwards, REQ-E2E-6)
  screenshot_max_mb: 2            # DLP — screenshot compression/downscale ceiling
  secrets_file: ".env.e2e"        # credential injection source (no plaintext commits; discarded at teardown)

# ── Parallel lanes (worktree) ────────────────────────────────────────────────
worktree:
  max_lanes: 2                    # concurrent lane count (fan out only module-non-conflicting issues)
  root: "../.ue-worktrees"        # lane worktree root
  base_ref: "fresh"               # branch base for isolated lanes — fresh=origin/<default> (recommended: reproducible, no unpushed work leaks in) | head=local HEAD (build on unpushed commits)
                                  #   bootstrap_repo.sh records this value as worktree.baseRef in the target repo .claude/settings.json

# ── ★ Workflow orchestration (Claude Code Workflow tool — opus·ultracode·dynamic) ──────────
#  ⚠️ "Workflow" here means the **Claude Code Workflow tool (multi-agent orchestration)**. It is entirely different from GitHub Projects
#  **built-in workflows** (closed→Done etc., roadmap side = gh-roadmap) — do not confuse them.
#  A skill cannot change the session model directly (the user sets --model), so enforcement happens by specifying subagent
#  model/effort/agentType on Workflow/Agent calls + strong instructions. Details = references/workflow-orchestration.md.
workflow:
  orchestrate: true               # orchestrate the core phases (pm planning chain / loop lanes) with the Workflow tool (enforced instruction)
  mode: ultracode                 # ultracode (per-phase multi-agent fan-out) | solo (single agent, small scale)
  pacing: dynamic                 # dynamic-workflow (dynamic pacing) — consistent with engine.loop.pacing
  agents:                         # ★ workflow-phase subagent defaults (model/effort/max subagents — recorded by bootstrap)
    model: opus                   #   subagent model (opus recommended). Empty = inherit the session model.
    effort: xhigh                 #   subagent effort: low | medium | high | xhigh | max
    max_subagents: 8              #   ★ max concurrently spawned subagents (concurrency cap). Actual concurrency = min(this, cores-2).
  by_phase:                       #   per-phase overrides (empty = inherit the agents defaults)
    pm:   { model: opus, effort: xhigh, max_subagents: 4 }   # planning chain (strategy, roadmap, red team, spec, prioritization) fan-out
    loop: { model: opus, effort: xhigh, max_subagents: 8 }   # lane fan-out (each lane = isolation:worktree)

# ── N-repo mode (multi repo / 1 shared board / session-manager workers) ───────────────────
#  references/multi-repo-orchestration.md is the authority. Activates when repos: lists 2 or more —
#  empty (default) means the scalar repo: above = the existing single-repo behavior (fully backward compatible).
repos: []                         # example (the meta cc fills this in):
#repos:
#  - name: owner/service-a
#    path: ~/work/service-a       # worker cwd [required in N-repo mode]
#    role: control-plane          # free-form label
#    default_stage: "2 Control-plane core"
#  - name: owner/service-b
#    path: ~/work/service-b
#    isolation: worktree          # worktree isolation when a host occupies the directory (occupancy is also auto-detected)

board:                            # ★ N-repo mode: the board is ONE shared board above the repos — do not create one per repo
  shared: false                   # true = shared board (workers must not create boards; they read only their own repo's cards, filtered)
  title: ""                       # shared board title (empty = "<first repo name> Platform"). board_bootstrap.sh idempotency key.
  stage_options: []               # Stage single-select option list (empty = omit the Stage field). e.g. ["1 Core", "2 Core API"]

orchestration:                    # ★ N-repo worker control (spawn authority = meta only; worker/hook calls forbidden)
  mode: in_process_lanes          # in_process_lanes (existing single repo) | session_mgr_sessions (N-repo tmux workers)
  spawn: tmux_new_session         # tmux_new_session (ul- prefixed sessions) | session_mgr (external session-manager CLI — optional.
                                  #   session name = basename → `ta` attach compatible + bookmark persists across reboots.
                                  #   ⚠️ ensure-hot does not start CC — CC startup is the script's job)
  channel: auto                   # auto (durable messaging when a message broker is available, else send_keys) | broker | send_keys
                                  #   broker = example broker API HTTP POST /team/messages → durable worker inbox (+ send-keys wake-up bonus, no loss)
  tmux_socket: ""                 # "" = default server | "ultraloop" = isolated socket (tmux -L) — protects the operational tmux server
  max_concurrent_workers: 2       # concurrent worker cap (throttles usage and tmux load)
  stagger_seconds: 20             # no simultaneous worker start — sequential start interval
  permission_mode: bypassPermissions

# ── Notifications & approvals — Discord gateway bot (outbound WS) ─────────────
#  (decision 3: server/channel/bot token/approvers/TTL)
discord:
  enabled: true
  mode: gateway_bot               # gateway_bot (WS, receives buttons) | webhook_outbound (fallback, notify only) | console
  token_env: ULTRALOOP_DISCORD_BOT_TOKEN   # env name to read the bot token from (no plaintext)
  notify_channel_id: ""           # routine notifications (loop/push/CI/E2E/heartbeat)
  approval_channel_id: ""         # high-risk approval buttons [Y]/[N]
  approver_user_ids: [""]         # user ids with approval authority
  approval_ttl_minutes: 120       # no-response TTL → escalate/defer (REQ-APR-3)

# ── Risk (defaults; rules live in references/notify-approval.md) ─────────────
risk:
  # references is the authority for classifying high risk (approval queue + park) vs low risk (notify + proceed). Only toggles here.
  treat_dependency_major_as_high: true
